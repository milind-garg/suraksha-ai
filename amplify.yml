version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            # Pin Node.js 20 (required by this project)
            - nvm install 20
            - nvm use 20
            - node --version
            - npm install --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        # Static export: Next.js writes pre-rendered HTML/CSS/JS to `out/`.
        # Amplify static hosting (WEB mode) serves this directory directly,
        # so every route has its own index.html and the root URL resolves
        # to out/index.html — no WEB_COMPUTE / SSR runtime required.
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend