version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install --legacy-peer-deps
        build:
          commands:
            - npm run build
            - echo "=== Listing build output ==="
            - ls -la
            - ls -la out || echo "NO OUT FOLDER"
            - ls -la .next || echo "NO .NEXT FOLDER"
      artifacts:
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend